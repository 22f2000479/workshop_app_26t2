{% extends 'base.html' %}
{% block content %}
  <div class="card">
    <h2>Step 2 of 4: Academic Background</h2>
    <div class="card-grid">
      <div class="status-card">
        <strong>Current GPA</strong>
        <div id="current-gpa">0.00</div>
        <div class="small-note">GPA calculated from <span id="course-count">0</span> courses.</div>
      </div>
    </div>
    <div class="card" style="margin-top: 16px;">
      <h3>Add Courses</h3>
      <div class="form-row">
        <div>
          <label for="course_name">Course Name *</label>
          <input id="course_name" type="text" placeholder="Data Structures" />
        </div>
        <div>
          <label for="course_code">Course Code</label>
          <input id="course_code" type="text" placeholder="CS 301" />
        </div>
        <div>
          <label for="course_grade">Grade Obtained *</label>
          <select id="course_grade">
            <option value="">Select grade</option>
            <option>A</option><option>A-</option><option>B+</option><option>B</option><option>B-</option>
            <option>C+</option><option>C</option><option>C-</option><option>D</option><option>F</option><option>P</option><option>NP</option>
          </select>
        </div>
        <div>
          <label for="course_semester">Semester/Year</label>
          <select id="course_semester">
            <option value="">Select semester</option>
            <option>Spring 2023</option><option>Fall 2023</option><option>Spring 2024</option><option>Fall 2024</option>
            <option>Spring 2025</option><option>Fall 2025</option>
          </select>
        </div>
      </div>
      <button type="button" class="btn" onclick="addCourse()">Add Course</button>
      <div class="error-text" id="error-course"></div>
    </div>
    <div class="card">
      <h3>Courses List</h3>
      <table class="table">
        <thead><tr><th>Course Name</th><th>Course Code</th><th>Grade</th><th>Semester</th><th>Action</th></tr></thead>
        <tbody id="courses-body"></tbody>
      </table>
      <div class="error-text" id="error-course-min"></div>
    </div>
    <div class="button-row">
      <button type="button" class="secondary" onclick="prevPage(2)">Back</button>
      <button type="button" class="btn" id="next-button" onclick="nextPage(2)">Next</button>
    </div>
  </div>
{% endblock %}
